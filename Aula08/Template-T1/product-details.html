<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Detalhes do produto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
    <style>
      .grid-bg {
        background-image: radial-gradient(#d9ceaa 0.8px, transparent 0.8px), radial-gradient(#d9ceaa 0.8px, #f8f7f2 0.8px);
        background-size: 28px 28px;
        background-position: 0 0, 14px 14px;
      }
    </style>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen grid-bg">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <nav class="flex gap-3 text-sm font-medium">
            <a href="categories.html" class="hover:text-accent-600">Categorias</a>
            <a href="cart.html" class="hover:text-accent-600">Carrinho</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <section class="grid gap-6 rounded-3xl border border-brand-200 bg-white p-6 shadow-sm md:grid-cols-2">
          <div class="rounded-2xl bg-brand-100 p-6">
            <div class="flex h-64 items-center justify-center rounded-xl border border-dashed border-brand-300 text-sm text-brand-700">Espaço reservado para imagem do produto</div>
          </div>
          <div>
            <p class="text-xs font-semibold uppercase tracking-wider text-brand-600">Eletrônicos</p>
            <h1 class="mt-1 font-display text-3xl font-bold">Câmera mirrorless usada</h1>
            <p class="mt-2 text-sm text-brand-700">Vendedor: PhotoPro Studio | Condição: Excelente</p>
            <p class="mt-4 text-brand-700">Inclui duas lentes, cartão de 64GB, alça e carregador original. Ideal para criadores de conteúdo que estão começando.</p>
            <p class="mt-5 font-display text-4xl font-bold text-coral-600">$650</p>
            <div class="mt-5 flex flex-wrap gap-3">
              <button class="rounded-xl bg-brand-900 px-5 py-2.5 font-semibold text-brand-50 hover:bg-brand-800">Adicionar ao carrinho</button>
              <button class="rounded-xl border border-brand-300 px-5 py-2.5 font-semibold hover:bg-brand-100">Salvar item</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
