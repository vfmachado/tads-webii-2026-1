<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Meus pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
    <style>
      .grid-bg {
        background-image: radial-gradient(#d9ceaa 0.8px, transparent 0.8px), radial-gradient(#d9ceaa 0.8px, #f8f7f2 0.8px);
        background-size: 28px 28px;
        background-position: 0 0, 14px 14px;
      }
    </style>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen grid-bg">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <nav class="flex gap-3 text-sm font-medium">
            <a href="categories.html" class="hover:text-accent-600">Comprar</a>
            <a href="cart.html" class="hover:text-accent-600">Carrinho</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-7xl space-y-6 px-4 py-8 sm:px-6 lg:px-8">
        <section class="rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
          <h1 class="font-display text-3xl font-bold">Meus pedidos</h1>
          <p class="mt-1 text-sm text-brand-700">Acompanhe os itens comprados e o status da entrega.</p>
          <div class="mt-5 overflow-x-auto rounded-2xl border border-brand-200">
            <table class="min-w-full text-left text-sm">
              <thead class="bg-brand-100 text-brand-800">
                <tr>
                  <th class="px-4 py-3 font-semibold">Pedido</th>
                  <th class="px-4 py-3 font-semibold">Data</th>
                  <th class="px-4 py-3 font-semibold">Itens</th>
                  <th class="px-4 py-3 font-semibold">Total</th>
                  <th class="px-4 py-3 font-semibold">Status</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-brand-200 bg-white">
                <tr>
                  <td class="px-4 py-3">#MKT-1001</td>
                  <td class="px-4 py-3">2026-03-08</td>
                  <td class="px-4 py-3">2</td>
                  <td class="px-4 py-3">$710</td>
                  <td class="px-4 py-3"><span class="rounded-full bg-accent-500/10 px-2 py-1 text-xs font-semibold text-accent-600">Enviado</span></td>
                </tr>
                <tr>
                  <td class="px-4 py-3">#MKT-0986</td>
                  <td class="px-4 py-3">2026-02-25</td>
                  <td class="px-4 py-3">1</td>
                  <td class="px-4 py-3">$129</td>
                  <td class="px-4 py-3"><span class="rounded-full bg-brand-200 px-2 py-1 text-xs font-semibold text-brand-700">Entregue</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
