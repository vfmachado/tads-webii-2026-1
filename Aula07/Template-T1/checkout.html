<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Finalização da compra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
    <style>
      .grid-bg {
        background-image: radial-gradient(#d9ceaa 0.8px, transparent 0.8px), radial-gradient(#d9ceaa 0.8px, #f8f7f2 0.8px);
        background-size: 28px 28px;
        background-position: 0 0, 14px 14px;
      }
    </style>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen grid-bg">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <a href="cart.html" class="text-sm font-semibold hover:text-accent-600">Voltar ao carrinho</a>
        </div>
      </header>

      <main class="mx-auto max-w-7xl space-y-6 px-4 py-8 sm:px-6 lg:px-8">
        <h1 class="font-display text-3xl font-bold">Finalização da compra</h1>
        <section class="grid gap-6 lg:grid-cols-3">
          <form class="space-y-4 rounded-3xl border border-brand-200 bg-white p-6 shadow-sm lg:col-span-2">
            <h2 class="font-display text-xl font-bold">Informações de entrega</h2>
            <div class="grid gap-4 sm:grid-cols-2">
              <input type="text" placeholder="Nome" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring" />
              <input type="text" placeholder="Sobrenome" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring" />
              <input type="text" placeholder="Endereço" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring sm:col-span-2" />
              <input type="text" placeholder="Cidade" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring" />
              <input type="text" placeholder="CEP" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring" />
            </div>
            <h2 class="pt-2 font-display text-xl font-bold">Pagamento</h2>
            <div class="grid gap-4 sm:grid-cols-2">
              <input type="text" placeholder="Nome no cartão" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring sm:col-span-2" />
              <input type="text" placeholder="Número do cartão" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring sm:col-span-2" />
              <input type="text" placeholder="MM/AA" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring" />
              <input type="text" placeholder="CVV" class="rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-accent-500 focus:ring" />
            </div>
            <button type="button" class="w-full rounded-xl bg-brand-900 px-4 py-2.5 font-semibold text-brand-50 hover:bg-brand-800">Finalizar pedido</button>
          </form>

          <aside class="rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
            <h2 class="font-display text-xl font-bold">Total do pedido</h2>
            <div class="mt-4 space-y-2 text-sm text-brand-700">
              <div class="flex justify-between"><span>Subtotal</span><span>$698</span></div>
              <div class="flex justify-between"><span>Frete</span><span>$12</span></div>
              <div class="flex justify-between font-bold text-brand-900"><span>Total</span><span>$710</span></div>
            </div>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
