<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>People & Hobbies</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">

  <div class="max-w-3xl mx-auto bg-white shadow-lg rounded-lg p-6">

    <h1 class="text-2xl font-bold mb-6">People & Hobbies</h1>

    <!-- FORM -->
    <form id="personForm" class="space-y-4 mb-8">

      <div>
        <label class="block text-sm font-medium text-gray-700">Name</label>
        <input
          id="name"
          type="text"
          required
          class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-blue-200"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">
          Hobbies (comma separated)
        </label>
        <input
          id="hobbies"
          type="text"
          placeholder="reading, gaming, running"
          class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-blue-200"
        />
      </div>

      <button
        type="submit"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700"
      >
        Add Person
      </button>

    </form>

    <!-- FILTERS -->
    <div class="grid grid-cols-2 gap-4 mb-6">

      <input
        id="filterName"
        type="text"
        placeholder="Filter by name..."
        class="border rounded-lg p-2"
      />

      <input
        id="filterHobby"
        type="text"
        placeholder="Filter by hobby..."
        class="border rounded-lg p-2"
      />

    </div>

    <!-- LIST -->
    <ul id="list" class="space-y-3"></ul>

  </div>

</body>
</html>
